name: Review Incoming Config PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'agent_repos.json'
      - 'plugin_repos.json'
      - 'skill_repos.json'
      - '.github/scripts/review_pr_config.py'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review-config-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted workflow code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Review submitted repo config changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 .github/scripts/review_pr_config.py
