name: Run review for PR #29

on:
  push:
    branches:
      - copilot/run-review-again

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  trigger-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted workflow code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Review submitted repo config changes for PR #29
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: "29"
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 .github/scripts/review_pr_config.py
