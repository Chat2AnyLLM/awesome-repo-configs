name: Notify Other Repos on Config Change

on:
  push:
    branches: [ main ]
    paths:
      - 'agent_repos.json'
      - 'plugin_repos.json'
      - 'skill_repos.json'
      - 'instruction_repos.json'
      - 'prompt_repos.json'
      - 'mcp_server_repos.json'
  workflow_dispatch:

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: python3 tests/test_json_validation.py

  notify-other-repos:
    runs-on: ubuntu-latest
    needs: validate-json
    strategy:
      fail-fast: false
      matrix:
        target:
          - awesome-claude-plugins
          - awesome-claude-agents
          - awesome-claude-skills
    env:
      DISPATCH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN || secrets.PERSONAL_ACCESS_TOKEN }}
    steps:
      - name: Validate dispatch token
        run: |
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "::error::Missing dispatch token. Configure REPO_DISPATCH_TOKEN (preferred) or PERSONAL_ACCESS_TOKEN."
            exit 1
          fi

      - name: Dispatch event to ${{ matrix.target }}
        run: |
          curl --fail-with-body --show-error --silent -X POST \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Chat2AnyLLM/${{ matrix.target }}/dispatches \
            -d '{
              "event_type": "config-updated",
              "client_payload": {
                "source_repo": "awesome-repo-configs",
                "ref": "${{ github.ref }}",
                "sha": "${{ github.sha }}"
              }
            }'
